name: Lint

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  Ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: python -m pip install "ruff>=0.15.6"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  Pydoclint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pydoclint
        run: python -m pip install "pydoclint>=0.8.3"
      - name: Pydoclint check
        run: pydoclint .

  Bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install bandit
        run: python -m pip install "bandit>=1.9.4"
      - name: Bandit security scan
        run: bandit -c _bandit.yaml -ll -r .
