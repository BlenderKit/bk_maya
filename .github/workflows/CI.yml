name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded runs on the same ref so pushing twice doesn't spin up
# duplicate pipelines.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  Lint:
    # Ruff (lint + format), pydoclint and bandit — all Python-only, fast,
    # share the same interpreter setup.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install lint tools
        run: |
          python -m pip install \
            "ruff==0.15.20" \
            "pydoclint==0.9.1" \
            "bandit==1.9.4"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check --diff .
      - name: Pydoclint check
        run: pydoclint .
      - name: Bandit (medium+)
        run: bandit -c _bandit.yaml -ll -r .

  # The Go client's own unit tests, gofmt and coverage run in the bk_client
  # repository's CI, not here. This repo only *builds* the client (see Build).

  Maya-Port-Unit-Tests:
    # Pure-Python tests for Maya port modules with no Maya/Qt dependency:
    # PRX coordinate converters, locator-state registries, PRX round-trip.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          # bk_proxor lives in bk_maya/bk_proxor as a git submodule and is
          # required by tests.test_proxor_maya_draw / test_prx_format_roundtrip.
          submodules: recursive
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install coverage
        run: python -m pip install coverage
      - name: Run Maya-port unit tests
        run: |
          python -m coverage run --source=bk_maya/bk_proxor/src/bk_proxor,bk_maya/core \
              -m unittest \
                  tests.test_proxor_maya_draw \
                  tests.test_locator_state \
                  tests.test_prx_format_roundtrip \
                  tests.test_global_vars
          python -m coverage xml -o coverage-maya-port.xml
      - name: Upload Maya-port coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-maya-port.xml
          flags: maya-port
          fail_ci_if_error: false

  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './bk_client/client/go.mod'
          cache-dependency-path: './bk_client/client/go.sum'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build add-on
        run: python bk_maya/dev.py build
      - name: Store the build
        uses: actions/upload-artifact@v4
        with:
          name: bk_maya-${{ github.event.pull_request.number || github.sha }}
          path: |
            out/stage
