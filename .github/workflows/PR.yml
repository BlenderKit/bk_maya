name: PR

on:
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  Checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './client/go.mod'
          cache-dependency-path: './client/go.sum'
        id: go
      - name: Python - install dependencies
        run: python -m pip install -r devs/requirements.txt
      - name: Go format check
        run: test -z $(gofmt -l ./client)
      - name: ISORT
        run: python -m isort . --check-only --diff
        continue-on-error: true
      - name: BLACK
        run: python -m black . --check --diff

  Client-Unit-Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './client/go.mod'
          cache-dependency-path: './client/go.sum'
        id: go
      - name: Go test
        working-directory: ./client
        run: go test -coverprofile=coverage-go.out
      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: client/coverage-go.out
          flags: go
          fail_ci_if_error: false

  Maya-Port-Unit-Tests:
    # Pure-Python tests for Maya port modules that have no Maya/Qt
    # dependencies (PRX coordinate converters, locator-state registries,
    # PRX format read/write round-trip).
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install coverage
        run: python -m pip install coverage
      - name: Run Maya-port unit tests
        run: |
          python -m coverage run --source=bk_maya/bk_proxor/src/bk_proxor,bk_maya/core \
              -m unittest \
                  tests.test_proxor_maya_draw \
                  tests.test_locator_state \
                  tests.test_prx_format_roundtrip
          python -m coverage xml -o coverage-maya-port.xml
      - name: Upload Maya-port coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-maya-port.xml
          flags: maya-port
          fail_ci_if_error: false

  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './client/go.mod'
          cache-dependency-path: './client/go.sum'
        id: go
      - name: Build add-on
        run: python dev.py build
      - name: Store the build
        uses: actions/upload-artifact@v4
        with:
          name: blenderkit-PR${{ github.event.pull_request.number }}-${{ github.sha }}
          path: |
            out
            !out/blenderkit.zip

  make-tests-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: python .github/make-tests-matrix.py >> $GITHUB_OUTPUT

  TESTS:
    needs: make-tests-matrix
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.make-tests-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './client/go.mod'
          cache-dependency-path: './client/go.sum'
        id: go
      - name: Cache Blender
        id: blenderBinaryCache
        uses: actions/cache@v4
        with:
          path: /home/runner/blender
          key: blender-${{matrix.version}}-${{matrix.sha}}
      - name: Download Blender
        if: steps.blenderBinaryCache.outputs.cache-hit != 'true'
        run: curl ${{ matrix.download_url }} -o /home/runner/blender.tar.xz
      - name: Mkdir
        run: mkdir {/home/runner/.local/bin,/home/runner/blender} -p
      - name: Extract Blender
        if: steps.blenderBinaryCache.outputs.cache-hit != 'true'
        run: tar -xf /home/runner/blender.tar.xz -C /home/runner/blender --strip-components=1
      - name: Add Blender to PATH
        run: ln -s /home/runner/blender/blender /home/runner/.local/bin/blender
      - name: Install coverage (Blender Python)
        run: blender --background --python-expr "import subprocess, sys; subprocess.check_call([sys.executable, '-m', 'ensurepip']); subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'coverage'])"
        continue-on-error: true
      - name: TEST
        env:
          COVERAGE: "1"
        run: python dev.py test --install-at /home/runner/.config/blender/${{matrix.version_x_y}}/scripts/addons
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-python.xml
          flags: python
          fail_ci_if_error: false
