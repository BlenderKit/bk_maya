name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Produces a ready-to-use, zero-setup zip and publishes it to GitHub Releases.
#
#   • Every merge / push to `main`   → automatic ALPHA prerelease (rolling)
#   • Every push to `master`         → STABLE release
#   • Manual "Run workflow" button   → choose the channel yourself
#
# The version is computed by `bk_maya/dev.py` as  major.minor.YYMMDDHHmm
# (with a `-alpha` suffix on the alpha channel) and is baked into the plugin
# itself (bk_maya/_build_version.py) so users/admins can see exactly what they
# have installed.
#
# CLIENT BINARIES:
#   The Go client lives in its own repo (BlenderKit/bk_client). `dev.py release`
#   downloads the *signed* `bk_client.zip` from that repo's GitHub Releases —
#   we never build/sign the client here, so the shipped binaries are the
#   correctly code-signed/notarized ones. Pass `--client-build <bk_client.zip>`
#   (or set BLENDKIT_CLIENT_BINARIES) to use a locally downloaded signed bundle.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel to build'
        type: choice
        options: [alpha, stable]
        default: stable

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # bk_proxor and bk_client are submodules required by the build.
          submodules: recursive
          # Full history so `git rev-parse HEAD` (the build's commit stamp)
          # and rolling-tag moves work reliably.
          fetch-depth: 0

      - name: Determine release channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANNEL="${{ github.event.inputs.channel }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            CHANNEL="alpha"
          else
            CHANNEL="stable"
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Selected channel: $CHANNEL"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build add-on
        # `release` downloads the signed bk_client.zip from the bk_client
        # GitHub Releases (no local client build). To use a locally downloaded
        # signed bundle instead, append: --client-build <bk_client.zip>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bk_maya/dev.py release --channel "${{ steps.channel.outputs.channel }}"

      - name: Read built version
        id: version
        run: |
          VERSION=$(python -c "import runpy; print(runpy.run_path('out/stage/blendkit/bk_maya/_build_version.py')['VERSION'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Built version: $VERSION"

      - name: Name the artifact
        id: artifact
        run: |
          BUILT="out/blendkit-maya-${{ steps.version.outputs.version }}.zip"
          if [ "${{ steps.channel.outputs.channel }}" = "alpha" ]; then
            # Stable filename so the rolling alpha release always overwrites it.
            NAME="blendkit-maya-alpha.zip"
          else
            NAME="blendkit-maya-${{ steps.version.outputs.version }}.zip"
          fi
          cp "$BUILT" "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # ── ALPHA: one rolling prerelease, retagged to the latest main commit ──
      - name: Move rolling `alpha` tag
        if: steps.channel.outputs.channel == 'alpha'
        run: |
          git tag -f alpha
          git push -f origin alpha

      - name: Publish alpha prerelease
        if: steps.channel.outputs.channel == 'alpha'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha
          name: "Alpha (rolling) — ${{ steps.version.outputs.version }}"
          prerelease: true
          body: |
            Automated **alpha** build from `main`.

            - Version: `${{ steps.version.outputs.version }}`
            - Commit: ${{ github.sha }}

            **Install:** download the zip, unzip it into a Maya `modules`
            directory, then restart Maya. No extra packages or setup required.
          files: ${{ steps.artifact.outputs.name }}

      # ── STABLE: a normal, versioned release ───────────────────────────────
      - name: Publish stable release
        if: steps.channel.outputs.channel == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Blendkit-maya ${{ steps.version.outputs.version }}"
          prerelease: false
          body: |
            Blendkit-maya **${{ steps.version.outputs.version }}**.

            - Commit: ${{ github.sha }}

            **Install:** download the zip, unzip it into a Maya `modules`
            directory, then restart Maya. No extra packages or setup required.
          files: ${{ steps.artifact.outputs.name }}
